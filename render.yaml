services:
  - type: web
    name: bbti-boss-test
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bbti-db
          property: connectionString

databases:
  - name: bbti-db
    plan: free
